<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RX Step Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --bg:#080810; --bg-card:#0e0e1a; --bg-raised:#14141f; --bg-hover:#1a1a2e;
      --border:rgba(255,255,255,0.06); --border-glow:rgba(99,211,255,0.25);
      --neon:#63d3ff; --neon-dim:rgba(99,211,255,0.10); --neon-glow:rgba(99,211,255,0.40); --neon-mid:#38bdf8;
      --lime:#a3e635; --lime-dim:rgba(163,230,53,0.10); --lime-glow:rgba(163,230,53,0.35);
      --orange:#fb923c; --orange-dim:rgba(251,146,60,0.12);
      --gold:#fbbf24; --gold-dim:rgba(251,191,36,0.10); --gold-glow:rgba(251,191,36,0.30);
      --danger:#f87171; --success:#4ade80;
      --text-1:#f1f5f9; --text-2:#94a3b8; --text-3:#475569; --text-4:#1e293b;
      --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:32px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Barlow','Sarabun',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    button{cursor:pointer;font-family:inherit;} input,textarea{font-family:inherit;}

    .scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
    .scene::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% -10%,rgba(99,211,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at -10% 80%,rgba(163,230,53,0.05) 0%,transparent 60%);}
    .scene-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(99,211,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(99,211,255,0.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 80%);}
    .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.5;animation:orbFloat 12s ease-in-out infinite;}
    .orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(99,211,255,0.12),transparent 70%);top:-100px;right:-100px;animation-duration:14s;}
    .orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(163,230,53,0.08),transparent 70%);bottom:-50px;left:-80px;animation-duration:18s;animation-delay:-6s;}
    @keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-20px,15px)}}

    /* LOADING */
    .loading-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .5s,visibility .5s;}
    .loading-screen.hide{opacity:0;visibility:hidden;}
    .loading-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--neon),var(--lime));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px var(--neon-glow);animation:iconPop .6s cubic-bezier(.22,.68,0,1.4) both;}
    .loading-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--neon),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .dna-loader{display:flex;align-items:center;gap:5px;height:40px;}
    .dna-bar{width:4px;border-radius:99px;background:linear-gradient(to top,var(--neon),var(--lime));animation:dnaWave 1.2s ease-in-out infinite;box-shadow:0 0 8px var(--neon-glow);}
    .dna-bar:nth-child(1){animation-delay:0s}.dna-bar:nth-child(2){animation-delay:.1s}.dna-bar:nth-child(3){animation-delay:.2s}.dna-bar:nth-child(4){animation-delay:.3s}.dna-bar:nth-child(5){animation-delay:.4s}.dna-bar:nth-child(6){animation-delay:.5s}.dna-bar:nth-child(7){animation-delay:.4s}.dna-bar:nth-child(8){animation-delay:.3s}.dna-bar:nth-child(9){animation-delay:.2s}.dna-bar:nth-child(10){animation-delay:.1s}
    @keyframes dnaWave{0%,100%{height:8px;opacity:.4}50%{height:36px;opacity:1}}
    .loading-tip{font-size:12px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;animation:fadePulse 2s ease-in-out infinite;}
    @keyframes fadePulse{0%,100%{opacity:.4}50%{opacity:1}}

    /* SHELL */
    .shell{position:relative;z-index:1;min-height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;padding-bottom:60px;}

    /* LOGIN */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;width:100%;}
    .login-card{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-xl);padding:40px 28px;animation:slideUp .6s cubic-bezier(.22,.68,0,1.2) both;position:relative;overflow:hidden;}
    .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),var(--lime),transparent);animation:shimmer 3s linear infinite;}
    @keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
    .login-badge{display:inline-flex;align-items:center;gap:6px;background:var(--neon-dim);border:1px solid rgba(99,211,255,.2);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--neon);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;}
    .login-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--neon);box-shadow:0 0 6px var(--neon);animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .login-heading{font-family:'Barlow Condensed',sans-serif;font-size:56px;font-weight:900;line-height:.95;letter-spacing:1px;margin-bottom:4px;}
    .login-heading span{display:block;background:linear-gradient(135deg,var(--neon) 0%,var(--lime) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .login-company{font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.5px;margin-bottom:4px;}
    .login-sub{font-size:13px;color:var(--text-2);margin-bottom:28px;line-height:1.6;}
    .login-goal-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(163,230,53,.1);border:1px solid rgba(163,230,53,.25);border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--lime);margin-bottom:28px;}
    .input-group{position:relative;margin-bottom:12px;}
    .input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}
    .input-field{width:100%;background:var(--bg-raised);border:1.5px solid var(--border);border-radius:var(--r-md);padding:16px 20px 16px 46px;font-size:16px;font-weight:600;color:var(--text-1);letter-spacing:4px;outline:none;transition:border-color .25s,box-shadow .25s;}
    .input-field::placeholder{letter-spacing:0;font-size:13px;color:var(--text-3);font-weight:400;}
    .input-field:focus{border-color:var(--neon);box-shadow:0 0 0 4px rgba(99,211,255,.10);}
    .btn-login{width:100%;padding:18px;background:linear-gradient(135deg,var(--neon),var(--neon-mid));color:#080810;border:none;border-radius:var(--r-md);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;transition:transform .15s,box-shadow .25s,opacity .2s;}
    .btn-login:hover{box-shadow:0 0 40px var(--neon-glow);}
    .btn-login:active{transform:scale(.97);}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;}
    .login-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px;color:var(--text-3);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .login-features{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .login-feature{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:8px;}
    .feat-icon{font-size:16px;}

    /* HEADER */
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
    .brand-label{font-size:10px;color:var(--text-3);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
    .brand-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--neon),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
    .header-actions{display:flex;gap:8px;}
    .hdr-btn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--bg-raised);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .2s;}
    .hdr-btn:hover{background:var(--bg-hover);color:var(--text-1);}
    .hdr-btn svg{width:17px;height:17px;}

    /* COMPANY GOAL BANNER */
    .company-banner{margin:14px 16px 0;background:linear-gradient(135deg,rgba(99,211,255,0.05),rgba(163,230,53,0.04));border:1px solid rgba(99,211,255,0.15);border-radius:var(--r-md);padding:14px 16px;position:relative;overflow:hidden;}
    .company-banner::before{content:'🏢';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.08;}
    .cb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .cb-title{font-size:10px;color:var(--text-2);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
    .cb-pct{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--neon),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .cb-track{height:8px;background:var(--bg-raised);border-radius:99px;overflow:hidden;}
    .cb-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--neon),var(--lime));box-shadow:0 0 10px var(--neon-glow);transition:width 1.2s cubic-bezier(.22,.68,0,1.2);min-width:2px;}
    .cb-feet{display:flex;justify-content:space-between;margin-top:6px;}
    .cb-cur{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--neon);}
    .cb-goal{font-size:10px;color:var(--text-3);}

    /* USER HERO */
    .user-hero{margin:10px 16px 0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;}
    .user-avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--neon),var(--lime));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#080810;flex-shrink:0;}
    .user-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;line-height:1.1;}
    .user-dept{font-size:11px;color:var(--neon);font-weight:500;margin-top:2px;}
    .user-sessions{display:flex;flex-direction:column;align-items:center;background:var(--lime-dim);border:1px solid rgba(163,230,53,.15);border-radius:10px;padding:6px 10px;margin-left:auto;flex-shrink:0;}
    .sess-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--lime);line-height:1;}
    .sess-lbl{font-size:9px;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;}

    /* TABS */
    .tab-bar{display:flex;gap:6px;margin:12px 16px 0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:5px;}
    .tab-item{flex:1;padding:9px 4px;border-radius:11px;border:none;background:transparent;color:var(--text-3);font-family:'Barlow','Sarabun',sans-serif;font-size:11px;font-weight:600;letter-spacing:.3px;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:4px;position:relative;}
    .tab-item.active{background:linear-gradient(135deg,rgba(99,211,255,.15),rgba(163,230,53,.10));color:var(--neon);border:1px solid rgba(99,211,255,.2);}
    .tab-item svg{width:13px;height:13px;flex-shrink:0;}
    .tab-badge{background:var(--gold);color:#080810;border-radius:99px;padding:1px 5px;font-size:9px;font-weight:900;line-height:1.4;}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 16px 0;}
    .stat-tile{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 8px;text-align:center;animation:fadeUp .5s both;}
    .stat-tile-icon{font-size:16px;margin-bottom:3px;}
    .stat-tile-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;}
    .stat-tile-label{font-size:9px;color:var(--text-3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

    /* RING */
    .ring-section{margin:14px 16px 0;display:flex;flex-direction:column;align-items:center;}
    .ring-outer{position:relative;width:210px;height:210px;display:flex;align-items:center;justify-content:center;}
    .ring-svg{position:absolute;inset:0;transform:rotate(-90deg);}
    .ring-track{fill:none;stroke:var(--bg-raised);stroke-width:12;}
    .ring-fill{fill:none;stroke-width:12;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;transition:stroke-dashoffset .8s cubic-bezier(.22,.68,0,1.2);}
    .ring-glow{fill:none;stroke:var(--neon);stroke-width:18;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:565;opacity:.15;filter:blur(6px);transition:stroke-dashoffset .8s;}
    .ring-fill.walking{animation:ringPulse 1.8s ease-in-out infinite;}
    @keyframes ringPulse{0%,100%{filter:drop-shadow(0 0 6px var(--neon-glow))}50%{filter:drop-shadow(0 0 18px var(--neon-glow))}}
    .ring-core{z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;}
    .ring-steps-val{font-family:'Barlow Condensed',sans-serif;font-size:54px;font-weight:900;line-height:1;background:linear-gradient(180deg,var(--text-1) 60%,var(--text-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .ring-steps-val.pop{animation:stepPop .3s cubic-bezier(.22,.68,0,1.4);}
    @keyframes stepPop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
    .ring-unit{font-size:10px;color:var(--text-3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
    .ring-status{margin-top:6px;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:var(--bg-raised);color:var(--text-3);border:1px solid var(--border);transition:all .3s;}
    .ring-status.active{background:rgba(99,211,255,.1);color:var(--neon);border-color:rgba(99,211,255,.3);animation:statusPulse 2s ease-in-out infinite;}
    @keyframes statusPulse{0%,100%{box-shadow:0 0 12px rgba(99,211,255,.1)}50%{box-shadow:0 0 24px rgba(99,211,255,.25)}}

    /* GOAL BAR */
    .goal-section{margin:12px 16px 0;}
    .goal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;}
    .goal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .goal-label{font-size:11px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
    .goal-pct{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--neon),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .goal-track{height:7px;background:var(--bg-raised);border-radius:99px;overflow:hidden;}
    .goal-progress{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--neon),var(--lime));box-shadow:0 0 10px var(--neon-glow);transition:width .8s cubic-bezier(.22,.68,0,1.2);min-width:0%;}
    .goal-feet{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-3);}

    /* METRICS */
    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 16px 0;}
    .metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;gap:10px;}
    .metric-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
    .metric-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1;}
    .metric-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

    /* SENSOR BAR */
    .sensor-bar{margin:8px 16px 0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3);font-family:'Courier New',monospace;}
    .sensor-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text-4);transition:all .3s;}
    .sensor-dot.on{background:var(--neon);box-shadow:0 0 8px var(--neon);animation:blink 1s infinite;}
    .sensor-dot.err{background:var(--danger);}

    /* CONTROLS */
    .controls{margin:10px 16px 0;display:flex;flex-direction:column;gap:8px;}
    .btn-main{width:100%;padding:18px;border-radius:var(--r-md);border:none;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s,box-shadow .25s;}
    .btn-main:active{transform:scale(.97);}
    .btn-start{background:linear-gradient(135deg,var(--neon),var(--neon-mid));color:#080810;box-shadow:0 4px 28px rgba(99,211,255,.2);}
    .btn-start:hover{box-shadow:0 4px 40px rgba(99,211,255,.4);}
    .btn-pause{background:var(--bg-raised);color:var(--gold);border:1.5px solid rgba(251,191,36,.4)!important;}
    .btn-upload{background:linear-gradient(135deg,var(--gold),#f59e0b);color:#080810;box-shadow:0 4px 24px rgba(251,191,36,.2);}
    .btn-save{width:100%;padding:16px;border-radius:var(--r-md);border:1.5px solid var(--border);background:transparent;color:var(--text-3);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;cursor:not-allowed;}
    .btn-save svg{width:18px;height:18px;}
    .btn-save.ready{border-color:rgba(163,230,53,.4);color:var(--lime);cursor:pointer;background:var(--lime-dim);}
    .btn-save.ready:hover{box-shadow:0 0 24px rgba(163,230,53,.12);}

    /* HISTORY */
    .history-section{margin:12px 16px 0;flex:1;}
    .history-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .history-sum-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;text-align:center;}
    .hscard-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--neon);}
    .hscard-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    .history-list-title{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600;}
    .history-empty{text-align:center;padding:50px 20px;color:var(--text-3);}
    .hist-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;animation:fadeUp .4s both;}
    .hist-date-box{background:var(--bg-raised);border-radius:10px;padding:6px 8px;text-align:center;min-width:44px;}
    .hist-day{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;}
    .hist-mon{font-size:9px;color:var(--text-3);text-transform:uppercase;}
    .hist-steps{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
    .hist-meta{font-size:11px;color:var(--text-3);margin-top:2px;}
    .hist-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;}
    .hist-badge.hit{background:rgba(74,222,128,.1);color:var(--success);border:1px solid rgba(74,222,128,.2);}
    .hist-badge.miss{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2);}
    .hist-badge.img{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(251,191,36,.2);}
    .hist-badge.pending-badge{background:rgba(251,191,36,.1);color:var(--gold);border:1px solid rgba(251,191,36,.2);}

    /* PENDING TAB */
    .pending-section{margin:12px 16px 0;}
    .pending-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}

  </style>
</head>
<body>
<div class="scene"><div class="scene-grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-icon">👟</div>
  <div class="loading-title">RX RUNNER</div>
  <div class="dna-loader">
    <div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div>
    <div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div><div class="dna-bar"></div>
  </div>
  <div class="loading-tip">RX Step Tracker — Loading...</div>
</div>
<div id="root"></div>

<script>
/* ============================================================
   CONFIG  ← แก้ไขก่อนใช้งาน
   ============================================================ */
var GAS_URL    = 'https://script.google.com/macros/s/AKfycbwlRm4xZAU2Ewu12U6E1dNg33uwou5fYSkfFWklzp56HgvbAu-wpE_9PSTNpq2hBU0MfA/exec';        // GAS Deployment URL
var GEMINI_KEY = 'YOUR_GEMINI_API_KEY_HERE'; // Gemini API Key

var COMPANY_GOAL = 15000000; // 15 ล้านก้าว

/* ============================================================
   STATE
   ============================================================ */
var S = {
  user: null,
  stats: { steps:0, calories:'0', distance:'0' },
  history: [], pending: [],
  companyGoal: { total:0, goal:15000000, pct:0 },
  sessionSteps: 0, isWalking: false, sensorOk: false, sensorTimer: null,
  dailyGoal: parseInt(localStorage.getItem('rx_goal')||'10000'),
  view: 'dashboard',
  // 5-Layer signal
  lpf:0, lpfAlpha:0.12, prevFiltered:0, prevDelta:0, lastStepTime:0,
  magnitudes:[], magWindow:50, threshMult:1.15, stepCooldown:380,
  recentPeaks:[], peakWindow:6, maxPeakVariance:8.0, maxAllowedMag:22.0
};

/* ============================================================
   JSONP
   ============================================================ */
var _cbId = 0;
function callGAS(action, payload, onOk, onErr) {
  var cb = '__rx_' + (++_cbId);
  var timer = setTimeout(function() {
    delete window[cb];
    onErr({ message: 'Timeout — ตรวจสอบ GAS URL' });
  }, 30000);
  window[cb] = function(data) {
    clearTimeout(timer); delete window[cb];
    if (data && data.error) onErr({ message: data.error });
    else onOk(data);
  };
  var qs = 'action='+encodeURIComponent(action)+'&payload='+encodeURIComponent(JSON.stringify(payload))+'&callback='+cb;
  var s = document.createElement('script');
  s.src = GAS_URL + '?' + qs;
  s.onerror = function() {
    clearTimeout(timer); delete window[cb];
    if (document.body.contains(s)) document.body.removeChild(s);
    onErr({ message: 'เชื่อมต่อ GAS ไม่ได้' });
  };
  document.body.appendChild(s);
}

/* ============================================================
   GEMINI — อ่านก้าวจากภาพ
   ============================================================ */
async function readStepsFromImage(base64, mimeType) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_KEY;
  var body = {
    contents: [{
      parts: [
        { text: 'นี่คือ screenshot จากแอปนับก้าว (Health, Samsung Health, Garmin ฯลฯ) กรุณาอ่านจำนวน STEPS (ก้าว) ในรูป แล้วตอบเป็นตัวเลขอย่างเดียวเท่านั้น ห้ามมีข้อความอื่น ห้ามมีหน่วย ถ้าอ่านไม่ได้ให้ตอบ ERROR' },
        { inline_data: { mime_type: mimeType, data: base64 } }
      ]
    }]
  };
  var res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!res.ok) throw new Error('Gemini HTTP ' + res.status);
  var data = await res.json();
  var text = (data.candidates?.[0]?.content?.parts?.[0]?.text || 'ERROR').trim();
  if (text === 'ERROR' || !text) return null;
  var num = parseInt(text.replace(/[^0-9]/g,''));
  return (isNaN(num) || num <= 0) ? null : num;
}

/* ============================================================
   SIGNAL PROCESSING (5 Layers)
   ============================================================ */
function lpfFilter(raw) {
  S.lpf = S.lpfAlpha * raw + (1 - S.lpfAlpha) * S.lpf;
  return S.lpf;
}
function dynThreshold() {
  if (S.magnitudes.length < 5) return 9.8 * S.threshMult;
  var sum = S.magnitudes.reduce(function(a,b){return a+b;},0);
  return (sum / S.magnitudes.length) * S.threshMult;
}
function peakVariance() {
  var p = S.recentPeaks;
  if (p.length < 3) return 0;
  var mean = p.reduce(function(a,b){return a+b;},0)/p.length;
  return p.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/p.length;
}
function processAcc(rawMag) {
  if (rawMag > S.maxAllowedMag) return;
  S.magnitudes.push(rawMag);
  if (S.magnitudes.length > S.magWindow) S.magnitudes.shift();
  var filtered = lpfFilter(rawMag);
  var delta = filtered - S.prevFiltered;
  S.prevFiltered = filtered;
  var isPeak = S.prevDelta > 0 && delta <= 0;
  S.prevDelta = delta;
  if (!isPeak) return;
  if (filtered < dynThreshold()) return;
  var now = Date.now();
  if (S.lastStepTime > 0 && (now - S.lastStepTime) < S.stepCooldown) return;
  S.recentPeaks.push(filtered);
  if (S.recentPeaks.length > S.peakWindow) S.recentPeaks.shift();
  if (S.recentPeaks.length >= 3 && peakVariance() > S.maxPeakVariance) return;
  S.lastStepTime = now;
  addStep(1);
}

/* ============================================================
   SENSOR
   ============================================================ */
function startWalking() {
  S.isWalking = true; S.sensorOk = false;
  S.lpf=0; S.prevFiltered=0; S.prevDelta=0;
  S.magnitudes=[]; S.recentPeaks=[]; S.lastStepTime=0;
  updateControls(); setSensor('กำลังเชื่อมต่อ...','checking');
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(function(st) {
        if (st === 'granted') attachMotion('iOS');
        else { stopWalking(); Swal.fire({icon:'error',title:'ไม่ได้รับสิทธิ์',text:'กรุณาเปิดใน Safari โดยตรง',confirmButtonText:'รับทราบ'}); }
      }).catch(function() { attachMotion('iOS Fallback'); });
  } else { attachMotion('Android/Web'); }
}
function attachMotion(lbl) {
  setSensor('รอสัญญาณ... '+lbl,'checking');
  window.addEventListener('devicemotion', onMotion);
  if (S.sensorTimer) clearTimeout(S.sensorTimer);
  S.sensorTimer = setTimeout(function() {
    if (!S.sensorOk && S.isWalking) {
      stopWalking();
      Swal.fire({icon:'error',title:'ไม่ตรวจพบเซ็นเซอร์',html:'เบราว์เซอร์บล็อก หรืออุปกรณ์ไม่รองรับ<br><small style="color:var(--text-3)">ลองใช้วิธีอัปโหลดรูปภาพแทนได้ครับ</small>',confirmButtonText:'รับทราบ'});
    }
  }, 3000);
}
function stopWalking() {
  S.isWalking = false; S.sensorOk = false;
  window.removeEventListener('devicemotion', onMotion);
  if (S.sensorTimer) { clearTimeout(S.sensorTimer); S.sensorTimer = null; }
  setSensor('หยุดแล้ว','off'); updateControls();
}
function onMotion(e) {
  if (!S.isWalking) return;
  var acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc || acc.x == null) return;
  if (!S.sensorOk) {
    S.sensorOk = true;
    setSensor('เซ็นเซอร์ทำงาน (5-Layer)','on');
    if (S.sensorTimer) clearTimeout(S.sensorTimer);
  }
  processAcc(Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z));
}
function addStep(n) {
  S.sessionSteps += n; updateRing();
  var el = document.getElementById('ringVal');
  if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
}

/* ============================================================
   RENDER: LOGIN
   ============================================================ */
function renderLogin() {

/* ============================================================
   AUTH
   ============================================================ */
function doLogin(id) {
  var btn=document.getElementById('btnLogin');
  btn.innerHTML='<span class="spin-ring"></span> กำลังเข้าสู่ระบบ...'; btn.disabled=true;
  callGAS('login', {userId:id},
    function(res) {

            <div style="font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;background:linear-gradient(135deg,var(--neon),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${Number(res.stats.steps).toLocaleString()}</div>
            <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">ก้าวสะสมทั้งหมด</div>

        confirmButtonText:'🚀 เริ่มนับก้าวเลย!'
      });

    function(err) {

    }

}
function doLogout() {
  Swal.fire({title:'ออกจากระบบ?',icon:'question',showCancelButton:true,confirmButtonText:'ออก',cancelButtonText:'ยกเลิก'})
  .then(function(r){ if(r.isConfirmed){stopWalking();S.user=null;S.sessionSteps=0;S.view='dashboard';renderLogin();} });
}

/* ============================================================
   RENDER: MAIN DASHBOARD
   ============================================================ */
function renderDashboard() {
  var u=S.user, stats=S.stats;
  var pct=Math.min(100,Math.round((S.sessionSteps/S.dailyGoal)*100));
  var offset=565-(565*pct/100);
  var cpct=parseFloat(S.companyGoal.pct||0);
  var pendingCount=S.pending.filter(function(p){return p.status==='pending';}).length;

  document.getElementById('root').innerHTML = `
    <div class="shell">
      <div class="header">
        <div><div class="brand-label">อาร์เอ็กซ์</div><div class="brand-name">RX RUNNER</div></div>

/* ============================================================
   HISTORY VIEW
   ============================================================ */
function renderHistView() {
  var h=S.history;
  var totalSteps=h.reduce(function(a,r){return a+Number(r.steps||r[3]||0);},0);
  var rows = h.length ? h.slice().reverse().map(function(r,i) {
    var steps = Number(r.steps||r[3]||0);
    var date  = r.date||r[1]||'';
    var kcal  = parseFloat(r.calories||r[4]||0).toFixed(1);
    var km    = parseFloat(r.distance||r[5]||0).toFixed(2);
    var mode  = r.mode||'sensor';
    var d     = new Date(date);
    var day   = isNaN(d.getDate())?'—':d.getDate();
    var mon   = isNaN(d.getMonth())?'':d.toLocaleString('th',{month:'short'});
    var hit   = steps >= S.dailyGoal;
    var badge = mode==='image' ? '<span class="hist-badge img">📷 รูปภาพ</span>' : (hit ? '<span class="hist-badge hit">✅ GOAL</span>' : '<span class="hist-badge miss">❌ MISS</span>');
    return `<div class="hist-item" style="animation-delay:${i*.04}s">
      <div class="hist-date-box"><div class="hist-day">${day}</div><div class="hist-mon">${mon}</div></div>
      <div><div class="hist-steps">${steps.toLocaleString()} ก้าว</div><div class="hist-meta">${kcal} kcal · ${km} km · ${mode==='image'?'📷':'📡'}</div></div>
      ${badge}</div>`;
  }).join('') : '<div class="history-empty">🏁 ยังไม่มีประวัติ</div>';

  return `<div class="history-section">
    <div class="history-summary">
      <div class="history-sum-card"><div class="hscard-val">${h.length}</div><div class="hscard-lbl">Sessions</div></div>
      <div class="history-sum-card"><div class="hscard-val">${(totalSteps/1000).toFixed(1)}K</div><div class="hscard-lbl">ก้าวรวม</div></div>
    </div>
    <div class="history-list-title">📋 บันทึกทั้งหมด</div>${rows}</div>`;
}

/* ============================================================
   PENDING VIEW
   ============================================================ */
function renderPendingView() {
  var p=S.pending;
  var rows = p.length ? p.slice().reverse().map(function(r) {
    var cls = r.status==='approved'?'badge-approved':r.status==='rejected'?'badge-rejected':'badge-pending';
    var lbl = r.status==='approved'?'✅ อนุมัติ':r.status==='rejected'?'❌ ปฏิเสธ':'⏳ รออนุมัติ';
    return `<div class="pending-item">
      <div><div class="pi-steps">${Number(r.steps||0).toLocaleString()} ก้าว</div><div class="pi-date">📅 ${r.date||''}</div>${r.adminNote?`<div class="pi-note">💬 ${r.adminNote}</div>`:''}</div>
      <span class="badge ${cls}">${lbl}</span></div>`;
  }).join('') : '<div class="pending-empty">📭 ไม่มีรายการรอดำเนินการ</div>';

  return `<div class="pending-section">
    <div class="pending-header"><div class="pending-title">📤 รายการอัปโหลดรูปภาพ</div></div>
    <div class="pending-card">${rows}</div>
    <button class="btn-main btn-upload" id="btnUploadPending" style="margin-top:4px;font-size:16px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>📷 อัปโหลดรูปภาพก้าวใหม่</button>

}

/* ============================================================
   BIND EVENTS
   ============================================================ */
function bindEvents() {
  document.getElementById('btnLogout').addEventListener('click', doLogout);
  document.getElementById('btnGoal').addEventListener('click', showGoalSheet);
  document.getElementById('tabDash').addEventListener('click', function(){S.view='dashboard';renderDashboard();});
  document.getElementById('tabHist').addEventListener('click', function(){S.view='history';renderDashboard();});
  document.getElementById('tabPending').addEventListener('click', function(){S.view='pending';renderDashboard();});

  if (S.view === 'dashboard') {
    document.getElementById('btnToggle').addEventListener('click', function(){ S.isWalking ? stopWalking() : showModeSheet(); });
    document.getElementById('btnUpload').addEventListener('click', showUploadSheet);
    document.getElementById('btnSave').addEventListener('click', function(){ if(S.sessionSteps>0) doSaveSensor(); });
  }
  if (S.view === 'pending') {
    var ub = document.getElementById('btnUploadPending');
    if (ub) ub.addEventListener('click', showUploadSheet);
  }
}

/* ============================================================
   IMAGE UPLOAD SHEET (Gemini AI read)
   ============================================================ */
function showUploadSheet() {
  var imgBase64='', imgMime='', detectedSteps=null;
  var div = document.createElement('div');
  div.innerHTML = `
    <div class="sheet-overlay" id="uploadOverlay">
      <div class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">📷 อัปโหลดรูปก้าวจากแอปอื่น</div>
        <div class="sheet-sub">แคปรูป screenshot จากแอปนับก้าว (Health, Samsung Health, Garmin ฯลฯ) Gemini AI จะอ่านจำนวนก้าวให้อัตโนมัติ</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*" style="display:none"/>
          <div class="upload-icon" id="uploadIcon">🖼️</div>
          <div class="upload-text" id="uploadText">แตะเพื่อเลือกรูปภาพ</div>
          <div class="upload-sub">รองรับ JPG, PNG · ขนาดไม่เกิน 5MB</div>
          <img id="uploadPreview" style="display:none" class="upload-preview"/>
        </div>
        <div id="geminiStatusWrap"></div>
        <div class="steps-confirm-box" id="stepsConfirmBox" style="display:none">
          <div class="scb-label">จำนวนก้าว — ตรวจสอบ / แก้ไขได้</div>
          <input type="number" id="stepsConfirmInput" class="scb-input" placeholder="0" min="1" max="999999"/>
          <div class="scb-unit">ก้าว (Steps)</div>
        </div>
        <button class="btn-sheet btn-sheet-gold" id="btnSubmitImg" disabled>📤 ส่งรอการอนุมัติ</button>
        <button class="btn-sheet btn-sheet-outline" id="btnCloseUpload">ยกเลิก</button>
      </div>
    </div>`;
  document.body.appendChild(div);

  var zone=document.getElementById('uploadZone');
  var fileInp=document.getElementById('fileInput');
  var preview=document.getElementById('uploadPreview');
  var statusWrap=document.getElementById('geminiStatusWrap');
  var confirmBox=document.getElementById('stepsConfirmBox');
  var stepsInp=document.getElementById('stepsConfirmInput');
  var submitBtn=document.getElementById('btnSubmitImg');

  zone.addEventListener('click', function(){ fileInp.click(); });

  fileInp.addEventListener('change', async function(e) {
    var file = e.target.files[0]; if (!file) return;
    if (file.size > 5*1024*1024) { Swal.fire({icon:'error',title:'ไฟล์ใหญ่เกินไป',text:'ขนาดไม่เกิน 5MB'}); return; }
    imgMime = file.type;
    var reader = new FileReader();
    reader.onload = async function(ev) {
      var result = ev.target.result;
      imgBase64 = result.split(',')[1];
      preview.src = result; preview.style.display='block';
      document.getElementById('uploadIcon').style.display='none';
      document.getElementById('uploadText').innerText = file.name;
      confirmBox.style.display='block'; submitBtn.disabled=true; stepsInp.value='';

      // Gemini read
      statusWrap.innerHTML = '<div class="gemini-status gs-reading"><span class="spin-ring-sm"></span> Gemini AI กำลังอ่านจำนวนก้าว...</div>';
      try {
        var steps = await readStepsFromImage(imgBase64, imgMime);
        if (steps) {
          detectedSteps = steps; stepsInp.value = steps;
          statusWrap.innerHTML = `<div class="gemini-status gs-done">✅ Gemini อ่านได้ <b>${steps.toLocaleString()} ก้าว</b> — ตรวจสอบและแก้ไขได้ก่อนส่ง</div>`;
        } else {
          statusWrap.innerHTML = '<div class="gemini-status gs-warn">⚠️ Gemini อ่านไม่ได้ — กรุณากรอกจำนวนก้าวเองในช่องด้านล่าง</div>';
        }
      } catch(err) {
        statusWrap.innerHTML = '<div class="gemini-status gs-err">❌ เชื่อมต่อ Gemini ไม่ได้ — กรุณากรอกจำนวนก้าวเอง</div>';
      }
      submitBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  stepsInp.addEventListener('input', function(){ submitBtn.disabled = (!stepsInp.value || parseInt(stepsInp.value)<1); });

  submitBtn.addEventListener('click', function() {
    var steps = parseInt(stepsInp.value);
    if (!steps || steps < 1) { Swal.fire({icon:'warning',title:'กรุณากรอกจำนวนก้าว',confirmButtonText:'ตกลง'}); return; }
    if (!imgBase64) { Swal.fire({icon:'warning',title:'กรุณาเลือกรูปภาพ',confirmButtonText:'ตกลง'}); return; }
    document.body.removeChild(div);
    doSubmitImage(steps, imgBase64);
  });
  document.getElementById('btnCloseUpload').addEventListener('click', function(){ document.body.removeChild(div); });
  document.getElementById('uploadOverlay').addEventListener('click', function(e){ if(e.target===this) document.body.removeChild(div); });
}

/* ============================================================
   SAVE: SENSOR MODE
   ============================================================ */
function doSaveSensor() {
  if (!S.sessionSteps) return;
  Swal.fire({
    title:'บันทึกผลการนับก้าว?',
    html:`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px">
      <div style="background:var(--bg-raised);border-radius:12px;padding:12px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--neon)">${S.sessionSteps.toLocaleString()}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase">ก้าว</div></div>
      <div style="background:var(--bg-raised);border-radius:12px;padding:12px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--orange)">${(S.sessionSteps*.04).toFixed(1)}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase">Kcal</div></div>
      <div style="background:var(--bg-raised);border-radius:12px;padding:12px;text-align:center"><div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--lime)">${(S.sessionSteps*.0007).toFixed(2)}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase">Km</div></div></div>`,
    icon:'question', showCancelButton:true, confirmButtonText:'💾 บันทึก', cancelButtonText:'ยกเลิก'
  }).then(function(r) {
    if (!r.isConfirmed) return;
    Swal.fire({title:'กำลังบันทึก...',allowOutsideClick:false,showConfirmButton:false,didOpen:function(){Swal.showLoading();}});
    callGAS('save', {data:{id:S.user.id,steps:S.sessionSteps,calories:(S.sessionSteps*.04).toFixed(1),distance:(S.sessionSteps*.0007).toFixed(2)}},
      function(res) {
        S.stats=res.stats; S.history=res.history||S.history;
        if(res.companyGoal) S.companyGoal=res.companyGoal;
        var prev=S.sessionSteps; S.sessionSteps=0; updateRing();
        var el=document.getElementById('totalSteps'); if(el) el.innerText=Number(S.stats.steps).toLocaleString();
        var bs=document.getElementById('btnSave'); if(bs){bs.disabled=true;bs.classList.remove('ready');}
        updateCompanyBanner();
        Swal.fire({icon:'success',title:prev>=S.dailyGoal?'🏆 ถึงเป้าหมาย!':'✅ บันทึกสำเร็จ!',html:prev>=S.dailyGoal?`<span style="color:var(--lime);font-weight:700">ยอดเยี่ยม! คุณทำได้ ${S.dailyGoal.toLocaleString()} ก้าวแล้ว! 🎉</span>`:`บันทึก <b style="color:var(--neon)">${prev.toLocaleString()} ก้าว</b>`,timer:3000,timerProgressBar:true,showConfirmButton:false});
      },
      function(err) { Swal.fire({icon:'error',title:'บันทึกไม่สำเร็จ',text:err.message,confirmButtonText:'ลองใหม่'}); }
    );
  });
}

/* ============================================================
   SAVE: IMAGE MODE — ส่งรอ Admin
   ============================================================ */
function doSubmitImage(steps, imageBase64) {
  Swal.fire({title:'กำลังส่งข้อมูล...',allowOutsideClick:false,showConfirmButton:false,didOpen:function(){Swal.showLoading();}});
  callGAS('submitPending', {data:{id:S.user.id,steps:steps,calories:(steps*.04).toFixed(1),distance:(steps*.0007).toFixed(2),imageBase64:imageBase64}},
    function(res) {
      S.pending.push({id:res.pendingId,date:new Date().toISOString().split('T')[0],steps:steps,status:'pending',adminNote:''});
      Swal.fire({icon:'success',title:'ส่งข้อมูลสำเร็จ! 📤',html:`<b style="color:var(--gold)">${steps.toLocaleString()} ก้าว</b><br><span style="color:var(--text-2);font-size:13px">รอ Admin อนุมัติ ตรวจสอบได้ที่แท็บ "รอผล"</span>`,timer:3500,timerProgressBar:true,showConfirmButton:false});
      if(S.view==='pending') renderDashboard();
    },
    function(err) { Swal.fire({icon:'error',title:'ส่งไม่สำเร็จ',text:err.message,confirmButtonText:'ลองใหม่'}); }
  );
}

function updateControls() {
  var btnToggle=document.getElementById('btnToggle');
  var btnSave=document.getElementById('btnSave');
  var ring=document.getElementById('ringFill');
  var status=document.getElementById('ringStatus');
  if (!btnToggle) return;
  if (S.isWalking) {
    btnToggle.className='btn-main btn-pause';
    btnToggle.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> หยุดชั่วคราว';
    if(ring) ring.classList.add('walking');
    if(btnSave){btnSave.disabled=true;btnSave.classList.remove('ready');}
    if(status){status.className='ring-status active';status.innerText='👟 กำลังนับก้าว...';}
  } else {
    btnToggle.className='btn-main btn-start';
    btnToggle.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><polygon points="5,3 19,12 5,21"/></svg> เริ่มนับก้าว';
    if(ring) ring.classList.remove('walking');
    if(S.sessionSteps>0&&btnSave){btnSave.disabled=false;btnSave.classList.add('ready');}
    if(status){status.className='ring-status';status.innerText='หยุดชั่วคราว';}
  }
}
function updateRing() {
  var s=S.sessionSteps, cal=(s*.04).toFixed(1), dist=(s*.0007).toFixed(2);
  var pct=Math.min(100,Math.round((s/S.dailyGoal)*100)), off=565-(565*pct/100);
  var G=function(id){return document.getElementById(id);};
  if(G('ringVal')) G('ringVal').innerText=s.toLocaleString();
  if(G('mCal'))    G('mCal').innerText=cal;
  if(G('mDist'))   G('mDist').innerText=dist;
  if(G('goalPct')) G('goalPct').innerText=pct+'%';
  if(G('goalCur')) G('goalCur').innerText=s.toLocaleString()+' ก้าว';
  if(G('goalBar')) G('goalBar').style.width=pct+'%';
  if(G('ringFill')) G('ringFill').style.strokeDashoffset=off;
  if(G('ringGlow')) G('ringGlow').style.strokeDashoffset=off;
}
function updateCompanyBanner() {
  var cg=S.companyGoal;
  var G=function(id){return document.getElementById(id);};
  if(G('cbPct')) G('cbPct').innerText=parseFloat(cg.pct||0).toFixed(1)+'%';
  if(G('cbCur')) G('cbCur').innerText=Number(cg.total||0).toLocaleString();
  if(G('cbFill')) G('cbFill').style.width=Math.max(0.2,parseFloat(cg.pct||0))+'%';
}
function setSensor(text, state) {
  var dot=document.getElementById('sensorDot'),txt=document.getElementById('sensorTxt'),mode=document.getElementById('sensorMode');
  if(dot){dot.className='sensor-dot';if(state==='on'){dot.classList.add('on');mode&&(mode.innerText='LIVE');}else if(state==='err'){dot.classList.add('err');mode&&(mode.innerText='ERR');}else{mode&&(mode.innerText='—');}}
  if(txt) txt.innerText=text;
}
function showGoalSheet() {
  var goals=[5000,7000,10000,12000],sel=S.dailyGoal;
  var div=document.createElement('div');
  div.innerHTML=`<div class="sheet-overlay"><div class="bottom-sheet"><div class="sheet-handle"></div><div class="sheet-title">🎯 เป้าหมายก้าวต่อวัน</div><div class="goal-grid">${goals.map(function(g){return`<div class="goal-chip ${S.dailyGoal===g?'sel':''}" data-val="${g}"><div class="goal-chip-num">${(g/1000).toFixed(0)}K</div><div class="goal-chip-lbl">${g.toLocaleString()} ก้าว</div></div>`;}).join('')}</div><button class="btn-sheet btn-sheet-neon" id="btnSaveGoal">บันทึกเป้าหมาย</button></div></div>`;
  document.body.appendChild(div);
  div.querySelectorAll('.goal-chip').forEach(function(el){
    el.addEventListener('click',function(){div.querySelectorAll('.goal-chip').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');sel=parseInt(el.dataset.val);});
  });
  document.getElementById('btnSaveGoal').addEventListener('click',function(){
    S.dailyGoal=sel;localStorage.setItem('rx_goal',sel);document.body.removeChild(div);updateRing();
    Swal.fire({icon:'success',title:'บันทึกแล้ว!',text:'เป้าหมาย '+sel.toLocaleString()+' ก้าว',timer:1500,showConfirmButton:false});
  });
  div.querySelector('.sheet-overlay').addEventListener('click',function(e){if(e.target===this) document.body.removeChild(div);});
}

/* BOOT */
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    document.getElementById('loadingScreen').classList.add('hide');
    renderLogin();
  }, 2000);
});
</script>
